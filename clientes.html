<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Cadastro de Clientes</title>
  <link rel="stylesheet" href="../style.css">
  <script src="../backend/script.js" defer></script>
</head>
<body>
  <h2>Cadastro de Clientes</h2>
  <form id="formCliente">
    <label>Nome:</label>
    <input type="text" id="nomeCliente" required><br><br>

    <label>CPF:</label>
    <input type="text" id="cpf" required><br><br>

    <label>Telefone:</label>
    <input type="text" id="telefoneCliente" required><br><br>

    <label>Email:</label>
    <input type="email" id="emailCliente" required><br><br>

    <label>Endereço:</label>
    <input type="text" id="enderecoCliente" required><br><br>
    
    <button type="submit">Salvar</button>
  </form>
  <a href="index.html">Voltar à página inicial</a>
</body>
</html>
