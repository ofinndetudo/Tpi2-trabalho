<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Cadastro de Categorias</title>
  <link rel="stylesheet" href="../style.css">
  <script src="../backend/script.js" defer></script>
</head>
<body>
  <h2>Cadastro de Categorias</h2>
  <form id="formCategoria">
    <div>
      <label>Nome da Categoria:</label>
      <input type="text" id="nomeCategoria" required><br><br>

      <label>Descrição:</label>
      <input type="text" id="descricao" required><br>
    </div>

    <div>
      <label>Data de Criação:</label>
      <input type="date" id="dataCriacao" required><br><br>

    <label>Status:</label>
    <select id="status"><option>Ativa</option><option>Inativa</option></select><br>
  </div><br>

    <div>
      <label>Responsável:</label>
      <input type="text" id="responsavel" required><br><br>

    <button type="submit">Salvar</button></div>
  </form>
  <a href="index.html">Voltar à página inicial</a>
</body>
</html>
