<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Registro de Vendas</title>
  <link rel="stylesheet" href="../style.css">
  <script src="../backend/script.js" defer></script>
</head>
<body>
  <h2>Registro de Vendas</h2>
  <form id="formVenda">

    <label>Cliente:</label>
    <input type="text" id="clienteVenda" required><br><br>

    <label>Produto:</label>
    <input type="text" id="produtoVenda" required><br><br>

    <label>Quantidade:</label>
    <input type="number" id="quantidadeVenda" required><br><br>

    <label>Preço Unitário:</label>
    <input type="number" id="precoUnitario" required><br> <br>

    <label>Data da Venda:</label>
    <input type="date" id="dataVenda" required><br> <br>
    <button type="submit">Registrar</button>

  </form>
  <a href="index.html">Voltar à página inicial</a>
</body>
</html>
