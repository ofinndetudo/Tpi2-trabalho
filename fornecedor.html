<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Cadastro de Fornecedores</title>
  <link rel="stylesheet" href="../style.css">
  <script src="../backend/script.js" defer></script>
</head>
<body>
  <h2>Cadastro de Fornecedores</h2>
  <form id="formFornecedor">
    <label>Nome:</label>
    <input type="text" id="nomeFornecedor" required><br><br>

    <label>CNPJ:</label>
    <input type="text" id="cnpj" required><br><br>

    <label>Telefone:</label>
    <input type="text" id="telefone" required><br><br>

    <label>Email:</label>
    <input type="email" id="email" required><br><br>

    <label>Endereço:</label>
    <input type="text" id="endereco" required><br><br>

    <button type="submit">Salvar</button>
  </form>
  <a href="index.html">Voltar à página inicial</a>
</body>
</html>
