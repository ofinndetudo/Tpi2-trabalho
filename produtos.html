<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Cadastro de Produtos</title>
    <link rel="stylesheet" href="../style.css">
  <script src="../backend/script.js" defer></script>
</head>
<body>
  <h2>Cadastro de Produtos</h2>
  <form id="formProduto">
    <label>Nome:</label>
    <input type="text" id="nome" required><br><br>

    <label>Categoria:</label>
    <input type="text" id="categoria" required><br><br>
    
    <label>Preço:</label>
    <input type="number" id="preco" required><br><br>

    <label>Quantidade:</label>
    <input type="number" id="quantidade" required><br><br>

    <label>Fornecedor:</label>
    <input type="text" id="fornecedor" required><br><br>
    <button type="submit">Salvar</button>
  </form>
  <a href="index.html">Voltar à página inicial</a>
</body>
</html>
